services:
  - type: web
    name: camargoapps-pdf-converter
    runtime: python
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y \
        tesseract-ocr \
        tesseract-ocr-por \
        poppler-utils \
        libgl1-mesa-glx \
        libreoffice \
        && pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true
